<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="karkarix">
    <meta name="keywords" content="clicker">
    <meta name="description" content="A minimalist incremental clicker game. Click to earn clicks, buy upgrades to boost your click power, unlock an auto-clicker, and warp to reset progress with permanent multipliers. No end — just keep clicking.">
    <title>I-Clicker</title>
    <link rel="icon" type="image/svg+xml" href="icon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="clicker_style.css">
</head>
<body>
    <h1>I-Clicker</h1>
    <hr>

    <main>
        <div class="stats">
            <p class="power">POWER: <span id="upgradeLVL">1</span></p>
            <p class="auto">AUTO: <span id="autoLVL" class="disabled">DISABLED</span></p>
            <p class="warp">WARP: <span id="warpLVL">0</span></p>
        </div>

        <div class="main">
            <p id="count">0</p><br>
            <button id="button" onclick="buttonClick()">click</button>
        </div>
        
        <div class="btns">
            <button id="upgrade" disabled onclick="upgradeClick()">upgrade<br>10</button>
            <button id="auto" disabled onclick="autoClick()">auto-clicker<br>100</button>
            <button id="warp" disabled onclick="warpGame()">warp<br>2000</button>
            <div style="width:100%;height:0"></div>
            <button id="debug" onclick="debug()">debug<br><span style="font-size: 8px;">for admins</span></button>
        </div>
    </main>

    <hr>
    <footer>2026 Чебоксары &copy; | version: betav2.0 | author: karkarix</footer>
    <script src="clicker_script.js"></script>
</body>
</html>
